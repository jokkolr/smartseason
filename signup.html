<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>🌾 SmartSeason Signup</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(to right, #a8e063, #56ab2f);
    }

    .box {
      background: white;
      padding: 30px;
      width: 320px;
      border-radius: 10px;
      text-align: center;
      box-shadow: 0 8px 20px rgba(0,0,0,0.2);
    }

    h2 {
      color: #2e7d32;
      margin-bottom: 15px;
    }

    input, select, button {
      width: 100%;
      margin-top: 10px;
      padding: 10px;
      border-radius: 5px;
      border: 1px solid #ccc;
    }

    button {
      background: #2e7d32;
      color: white;
      border: none;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background: #1b5e20;
    }

    a {
      display: block;
      margin-top: 12px;
      color: #2e7d32;
      font-size: 14px;
      text-decoration: none;
    }

    #message {
      margin-top: 10px;
      font-size: 14px;
    }
  </style>
</head>

<body>

<div class="box">

  <h2>🌾 Create Account</h2>

  <input id="username" placeholder="Username">
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">

  <select id="role">
    <option value="admin">Farm Coordinator</option>
    <option value="agent">Field Agent</option>
  </select>

  <button onclick="signup()">Sign Up</button>

  <a href="index.html">Already have an account? Login</a>

  <div id="message"></div>

</div>

<script>

function isValidEmail(email) {
  return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
}

async function signup() {

  const username = document.getElementById("username").value;
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;
  const role = document.getElementById("role").value;

  const messageBox = document.getElementById("message");

  // ------------------------
  // BASIC VALIDATION
  // ------------------------
  if (!username || !email || !password) {
    messageBox.style.color = "red";
    messageBox.innerText = "Please fill all fields";
    return;
  }

  // ------------------------
  // EMAIL VALIDATION (NEW)
  // ------------------------
  if (!isValidEmail(email)) {
    messageBox.style.color = "red";
    messageBox.innerText = "Please enter a valid email address";
    return;
  }

  try {

    const response = await fetch("http://localhost/smartseason/register.php", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        username: username,
        email: email,
        password: password,
        role: role
      })
    });

    const data = await response.json();

    if (data.message === "User registered") {
      messageBox.style.color = "green";
      messageBox.innerText = "Account created successfully! Redirecting...";

      setTimeout(() => {
        window.location.href = "index.html";
      }, 1500);

    } else {
      messageBox.style.color = "red";
      messageBox.innerText = data.message || "Signup failed";
    }

  } catch (error) {
    messageBox.style.color = "red";
    messageBox.innerText = "Server error. Check XAMPP or register.php";
    console.log(error);
  }
}

</script>

</body>
</html>
